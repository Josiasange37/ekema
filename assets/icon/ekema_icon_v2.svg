<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#053D2B"/>
      <stop offset="100%" stop-color="#0B6B4A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1DB872"/>
      <stop offset="100%" stop-color="#0B6B4A"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg2)"/>

  <!-- Large stylized "E" letterform made of horizontal bars -->
  <g filter="url(#shadow2)">
    <!-- Vertical bar of E -->
    <rect x="136" y="120" width="36" height="272" rx="18" ry="18" fill="#FFFFFF"/>
    <!-- Top bar of E -->
    <rect x="136" y="120" width="200" height="36" rx="18" ry="18" fill="#FFFFFF"/>
    <!-- Middle bar of E (shorter, with accent) -->
    <rect x="136" y="238" width="160" height="36" rx="18" ry="18" fill="#1DB872"/>
    <!-- Bottom bar of E -->
    <rect x="136" y="356" width="200" height="36" rx="18" ry="18" fill="#FFFFFF"/>
  </g>

  <!-- AI dot constellation (top right) -->
  <g opacity="0.8">
    <circle cx="368" cy="164" r="8" fill="#1DB872"/>
    <circle cx="396" cy="192" r="6" fill="#1DB872" opacity="0.7"/>
    <circle cx="360" cy="204" r="5" fill="#1DB872" opacity="0.5"/>
    <line x1="368" y1="164" x2="396" y2="192" stroke="#1DB872" stroke-width="2" opacity="0.4"/>
    <line x1="396" y1="192" x2="360" y2="204" stroke="#1DB872" stroke-width="2" opacity="0.3"/>
    <line x1="368" y1="164" x2="360" y2="204" stroke="#1DB872" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Speech wave arcs (bottom right — voice assistant) -->
  <g transform="translate(370, 320)" opacity="0.7">
    <path d="M0 0 Q16 -20 0 -40" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <path d="M14 8 Q36 -24 14 -48" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <path d="M28 16 Q56 -28 28 -56" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Small sparkle -->
  <g transform="translate(390, 130)" opacity="0.5">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
