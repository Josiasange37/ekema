<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient: deep green to medium green -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B6B4A"/>
      <stop offset="100%" stop-color="#1DB872"/>
    </linearGradient>
    <!-- Subtle shine overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Shadow for depth -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#053D2B" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
    </filter>
    <!-- Glow for the checkmark -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Shield body (trust / civic authority) -->
  <path d="
    M256 88
    C256 88 148 108 116 120
    C116 120 104 126 104 148
    L104 240
    C104 320 160 388 256 432
    C352 388 408 320 408 240
    L408 148
    C408 126 396 120 396 120
    C364 108 256 88 256 88Z
  " fill="#FFFFFF" fill-opacity="0.15" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.4"/>

  <!-- Inner shield face -->
  <path d="
    M256 112
    C256 112 164 128 136 140
    C136 140 124 144 124 162
    L124 244
    C124 312 172 372 256 410
    C340 372 388 312 388 244
    L388 162
    C388 144 376 140 376 140
    C348 128 256 112 256 112Z
  " fill="#FFFFFF" fill-opacity="0.1"/>

  <!-- Document icon (administrative procedures) -->
  <rect x="208" y="168" width="96" height="120" rx="8" ry="8" fill="#FFFFFF" fill-opacity="0.9"/>
  <!-- Document lines -->
  <line x1="224" y1="196" x2="280" y2="196" stroke="#0B6B4A" stroke-width="4" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="224" y1="214" x2="270" y2="214" stroke="#0B6B4A" stroke-width="4" stroke-linecap="round" stroke-opacity="0.3"/>
  <line x1="224" y1="232" x2="258" y2="232" stroke="#0B6B4A" stroke-width="4" stroke-linecap="round" stroke-opacity="0.2"/>

  <!-- Checkmark circle (success / completion) -->
  <circle cx="296" cy="280" r="36" fill="#1DB872" filter="url(#innerShadow)"/>
  <circle cx="296" cy="280" r="36" fill="#1DB872"/>
  <!-- Checkmark -->
  <polyline points="278,280 290,294 316,266"
    fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Speech bubble waves (AI / voice assistant) -->
  <g opacity="0.7">
    <!-- Wave 1 -->
    <path d="M148 310 Q136 330 148 350" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Wave 2 -->
    <path d="M132 298 Q114 330 132 362" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <!-- Wave 3 -->
    <path d="M116 286 Q92 330 116 374" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Small star sparkle (AI intelligence) -->
  <g transform="translate(370, 136)" opacity="0.6">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(156, 152)" opacity="0.35" transform-origin="156 152">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
