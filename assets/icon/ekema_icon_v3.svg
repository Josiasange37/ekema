<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B6B4A"/>
      <stop offset="50%" stop-color="#0E8157"/>
      <stop offset="100%" stop-color="#1DB872"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg3)"/>

  <!-- Central speech-bubble / shield hybrid -->
  <!-- Outer rounded shape combining shield + chat bubble -->
  <path d="
    M256 100
    C180 100 132 132 132 180
    L132 300
    C132 348 180 380 220 380
    L220 420
    L268 380
    L340 380
    C380 380 400 348 400 300
    L400 180
    C400 132 352 100 256 100Z
  " fill="#FFFFFF" fill-opacity="0.95"/>

  <!-- Inner document / AI brain icon -->
  <!-- Circuit-style lines suggesting AI -->
  <g stroke="#0B6B4A" stroke-width="3" stroke-linecap="round" opacity="0.2">
    <line x1="180" y1="180" x2="200" y2="180"/>
    <line x1="180" y1="200" x2="196" y2="200"/>
    <line x1="180" y1="320" x2="200" y2="320"/>
    <line x1="180" y1="340" x2="196" y2="340"/>
    <line x1="352" y1="180" x2="372" y2="180"/>
    <line x1="356" y1="200" x2="372" y2="200"/>
    <line x1="352" y1="320" x2="372" y2="320"/>
    <line x1="356" y1="340" x2="372" y2="340"/>
  </g>

  <!-- Central brain/circuit node -->
  <circle cx="266" cy="220" r="48" fill="none" stroke="#0B6B4A" stroke-width="4" opacity="0.15"/>
  <circle cx="266" cy="220" r="28" fill="none" stroke="#0B6B4A" stroke-width="3" opacity="0.2"/>

  <!-- Checkmark at center (main action = verify/guide) -->
  <g transform="translate(266, 220)">
    <circle r="32" fill="#0B6B4A"/>
    <polyline points="-14,2 -4,14 18,-10"
      fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Document lines below checkmark -->
  <line x1="220" y1="280" x2="312" y2="280" stroke="#0B6B4A" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="230" y1="300" x2="302" y2="300" stroke="#0B6B4A" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <line x1="240" y1="320" x2="292" y2="320" stroke="#0B6B4A" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
  <line x1="246" y1="340" x2="286" y2="340" stroke="#0B6B4A" stroke-width="4" stroke-linecap="round" opacity="0.1"/>
</svg>
